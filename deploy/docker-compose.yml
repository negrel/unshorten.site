version: '3'
services:
  traefik:
    image: "docker.io/library/traefik:v2.10.4"
    command: --configfile /etc/traefik/config.toml
    ports:
      - 80:80
      - 443:443
      - 127.0.0.1:8080:8080
    volumes:
      - ./traefik/:/etc/traefik

  unshorten-site:
    image: "docker.io/negrel/unshorten.site:latest"

  front:
    image: "docker.io/negrel/nginx-unshorten.site:latest"

